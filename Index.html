<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Planner UI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    window.Icon = ({ name, className = "", style = {} }) => (
      <span className={`material-symbols-outlined ${className}`} style={style}>{name}</span>
    );

    window.getTodayStr = () => {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };

    window.calculateHours = (inTime, outTime, breaks = []) => {
      if (!inTime || !outTime) return 0;
      const toDecimal = (timeStr) => {
        if(!timeStr) return 0;
        const [h, m] = timeStr.split(':').map(Number);
        return h + (m / 60);
      };
      let workHrs = toDecimal(outTime) - toDecimal(inTime);
      if (workHrs < 0) workHrs += 24;
      let breakHrs = 0;
      breaks.forEach(b => {
        if (b.start && b.end) {
          let bDuration = toDecimal(b.end) - toDecimal(b.start);
          if (bDuration < 0) bDuration += 24;
          breakHrs += bDuration;
        }
      });
      const total = workHrs - breakHrs;
      return total > 0 ? total : 0;
    };

    window.MOODS = [
      { id: 'happy', emoji: '😄', label: 'มีความสุข' },
      { id: 'normal', emoji: '🙂', label: 'เฉยๆ' },
      { id: 'tired', emoji: '😮‍💨', label: 'เหนื่อย' },
      { id: 'sad', emoji: '😢', label: 'เศร้า' },
      { id: 'angry', emoji: '😡', label: 'โกรธ' }
    ];
  </script>

  <?!= include('Main'); ?>
  <?!= include('Finance'); ?>
  <?!= include('Charts'); ?>
  <?!= include('Manage'); ?>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const Icon = window.Icon;
    const MOODS = window.MOODS;

    function App() {
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('main');
      const [data, setData] = useState(null);
      
      const [showMoodModal, setShowMoodModal] = useState(false);
      const [confirmTask, setConfirmTask] = useState({ isOpen: false, id: null, type: null });
      const [currentDate] = useState(new Date()); 
      const todayStr = window.getTodayStr();
      
      const [financeForm, setFinanceForm] = useState({ date: todayStr, type: 'expense', category: '', amount: '' });
      const [targetItemForm, setTargetItemForm] = useState({ text: '', amount: '' });
      const [calDate, setCalDate] = useState(new Date());
      const [chartSelectedDate, setChartSelectedDate] = useState(todayStr);
      const [manageNewItem, setManageNewItem] = useState({ text: '', date: todayStr, start: '', end: '', type: 'todo' });

      useEffect(() => {
        google.script.run
          .withSuccessHandler((serverData) => {
            setData(serverData);
            setLoading(false);
          })
          .withFailureHandler((error) => {
            console.error(error);
            alert("ไม่สามารถโหลดข้อมูลได้");
            setLoading(false);
          })
          .getInitialData(); 
      }, []);

      useEffect(() => {
        if(!data) return;
        const timer = setInterval(() => {
          const now = new Date();
          if (now.getHours() >= 22 && (!data.dailyLog || !data.dailyLog.mood)) {
            setShowMoodModal(true);
          }
        }, 60000);
        return () => clearInterval(timer);
      }, [data]);

      if (loading) {
        return (
          <div className="h-screen flex items-center justify-center bg-[#f4f1ea]">
             <div className="text-center">
               <Icon name="sync" className="animate-spin text-[#8b7355] text-4xl mb-2" />
               <p className="text-[#8b7355] font-bold mt-2">กำลังโหลด UI...</p>
             </div>
          </div>
        );
      }

      const currentMonthStr = todayStr.substring(0, 7);
      const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
      const daysLeft = daysInMonth - currentDate.getDate();
      const currentMonthTx = data.transactions.filter(t => t.date.startsWith(currentMonthStr));
      const totalIncome = currentMonthTx.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
      const totalExpense = currentMonthTx.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
      const currentBalance = totalIncome - totalExpense;
      const targetItems = data.finances.targetItems || [];
      const monthlyTarget = targetItems.reduce((sum, item) => sum + item.amount, 0);

      // --- ฟังก์ชันเมื่อกดทำรายการเสร็จ ---
      const toggleTodo = (id, type) => {
        setData(prev => {
          let nextState = { ...prev };
          
          if (type === 'todos') {
            // อัปเดต UI ทันที
            nextState.todos = prev.todos.map(item => item.id === id ? { ...item, completed: true } : item);
            // ส่งไป Code.gs (ระบุ Type เป็น 'To-Do')
            google.script.run.updateTodoStatusInSheet(id, 'To-Do', todayStr);
          } 
          else if (type === 'routines') {
            // ส่งไป Code.gs (ระบุ Type เป็น 'Schedule')
            google.script.run.updateTodoStatusInSheet(id, 'Schedule', todayStr);
          }
          else if (type === 'goals') {
             nextState.goals = prev.goals.map(item => item.id === id ? { ...item, completed: true } : item);
             google.script.run.updateGoalStatusInSheet(id, true);
          }

          // ข้อ 1: เอา ID ของสิ่งที่ทำเสร็จ (ไม่ว่าจะเป็น Type ไหน) ไปใส่ใน DailyLogs เสมอ
          let newCompleted = [...(nextState.dailyLog.completedIds || [])];
          if (!newCompleted.includes(id)) {
             newCompleted.push(id);
          }
          
          nextState.dailyLog = { ...nextState.dailyLog, completedIds: newCompleted };
          
          // บันทึกลงชีต DailyLogs ทันที
          google.script.run.saveDailyLogToSheet(nextState.dailyLog);

          return nextState;
        });
      };

      const deleteItem = (id, type) => setData(prev => ({ ...prev, [type]: prev[type].filter(item => item.id !== id) }));
      
      const handleSaveMood = (moodId) => { 
        setData(prev => {
          const nextState = { 
             ...prev, moodHistory: { ...prev.moodHistory, [todayStr]: moodId }, dailyLog: { ...prev.dailyLog, mood: moodId } 
          };
          google.script.run.saveDailyLogToSheet(nextState.dailyLog); 
          return nextState;
        });
        setShowMoodModal(false); 
      };

      const pageProps = {
        data, setData, todayStr, currentDate, daysLeft, currentMonthTx, totalIncome, totalExpense, currentBalance, targetItems, monthlyTarget,
        toggleTodo, deleteItem, financeForm, setFinanceForm, targetItemForm, setTargetItemForm,
        calDate, setCalDate, chartSelectedDate, setChartSelectedDate, manageNewItem, setManageNewItem, setConfirmTask
      };

      const MainTab = window.MainTab;
      const FinanceTab = window.FinanceTab;
      const ChartsTab = window.ChartsTab;
      const ManageTab = window.ManageTab;

      const Header = () => (
        <div className="bg-[#8b7355] text-white p-4 rounded-b-3xl shadow-md mb-4 flex justify-between items-end shrink-0">
          <div>
            <h1 className="text-2xl font-bold font-serif tracking-wider">DAILY PLANNER</h1>
            <p className="text-orange-100 text-sm opacity-90">{currentDate.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
          </div>
          <button onClick={() => setShowMoodModal(true)} className="bg-white text-[#8b7355] text-[10px] px-3 py-1.5 rounded-full shadow hover:bg-orange-50 font-bold flex items-center">
            <Icon name="sentiment_satisfied" className="text-[14px] mr-1" /> เช็คอารมณ์
          </button>
        </div>
      );

      const BottomNav = () => (
        <div className="bg-white border-t border-gray-200 flex justify-around p-2 shrink-0 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] z-50 relative pb-safe">
          {[
            { id: 'main', icon: 'home', label: 'หลัก' },
            { id: 'finance', icon: 'receipt_long', label: 'บัญชี' },
            { id: 'charts', icon: 'bar_chart', label: 'สถิติ' },
            { id: 'manage', icon: 'settings', label: 'ตั้งค่า' }
          ].map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center p-2 transition-colors w-1/4 ${activeTab === tab.id ? 'text-[#8b7355] scale-110' : 'text-gray-400'}`}>
              <Icon name={tab.icon} style={{ fontSize: '24px' }} />
              <span className="text-[10px] mt-1 font-medium">{tab.label}</span>
            </button>
          ))}
        </div>
      );

      const MoodModal = () => {
        if (!showMoodModal) return null;
        return (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] px-4 backdrop-blur-sm">
            <div className="bg-[#fff9f0] p-6 rounded-3xl w-full max-w-sm text-center shadow-xl border-4 border-[#8b7355]/20">
              <h2 className="text-2xl font-bold text-[#8b7355] mb-2">วันนี้เป็นยังไงบ้าง?</h2>
              <div className="flex justify-center gap-3 flex-wrap">
                {MOODS.map(m => (
                  <button key={m.id} onClick={() => handleSaveMood(m.id)} className="flex flex-col items-center justify-center w-16 h-16 bg-white rounded-2xl shadow hover:bg-orange-50 transition-all border border-orange-100">
                    <span className="text-3xl">{m.emoji}</span>
                  </button>
                ))}
              </div>
              <button onClick={() => setShowMoodModal(false)} className="mt-6 text-gray-400 text-sm">ข้ามไปก่อน</button>
            </div>
          </div>
        );
      };

      return (
        <div className="h-screen bg-gray-100 font-sans flex justify-center overflow-hidden">
          <div className="w-full max-w-md bg-[#f4f1ea] h-full shadow-2xl flex flex-col relative border-x border-gray-300">
            <Header />
            <main className="px-4 flex-1 overflow-y-auto pb-6 scroll-smooth">
              {activeTab === 'main' && <MainTab {...pageProps} />}
              {activeTab === 'finance' && <FinanceTab {...pageProps} />}
              {activeTab === 'charts' && <ChartsTab {...pageProps} />}
              {activeTab === 'manage' && <ManageTab {...pageProps} />}
            </main>
            <BottomNav />
            {confirmTask.isOpen && (
               <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] px-4 backdrop-blur-sm">
                  <div className="bg-white p-6 rounded-3xl w-full max-w-sm text-center shadow-xl">
                     <h3 className="text-lg font-bold text-[#8b7355] mb-2">ยืนยันการทำรายการ</h3>
                     <div className="flex gap-3 justify-center mt-6">
                        <button onClick={() => setConfirmTask({ isOpen: false })} className="px-6 py-2.5 bg-gray-100 text-gray-600 rounded-xl text-sm font-medium">ยกเลิก</button>
                        <button onClick={() => { toggleTodo(confirmTask.id, confirmTask.type); setConfirmTask({ isOpen: false }); }} className="px-6 py-2.5 bg-[#8b7355] text-white rounded-xl text-sm font-bold">เสร็จเรียบร้อย</button>
                     </div>
                  </div>
               </div>
            )}
            <MoodModal />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
