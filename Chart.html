<script type="text/babel">
  window.ChartsTab = (props) => {
    const { 
      data, chartSelectedDate, setChartSelectedDate, 
      calDate, setCalDate, todayStr 
    } = props;
    
    const Icon = window.Icon;
    const MOODS = window.MOODS;

    const weekDays = Array.from({length: 7}, (_, i) => {
      const d = new Date(); 
      d.setDate(d.getDate() - (6 - i));
      
      // ใช้ Local Time ป้องกันปัญหาโซนเวลา UTC
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const dateStr = `${yyyy}-${mm}-${dd}`; 

      const moodId = data.moodHistory[dateStr];
      const moodObj = MOODS.find(m => m.id === moodId) || { emoji: '⚪', id: 'none' };
      return { day: d.toLocaleDateString('th-TH', {weekday: 'short'}), emoji: moodObj.emoji, id: moodObj.id, date: dateStr };
    });

    const year = calDate.getFullYear(); const month = calDate.getMonth();
    const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();
    const changeMonth = (offset) => setCalDate(new Date(year, month + offset, 1));
    const days = [];
    for (let i = 0; i < firstDay; i++) days.push(null);
    for (let i = 1; i <= daysInMonth; i++) days.push(i);

    const completedOnSelected = [
      ...data.routines.filter(r => data.routineHistory?.[chartSelectedDate]?.includes(r.id)).map(r => ({...r, source: 'Schedule'})),
      ...data.todos.filter(t => t.date === chartSelectedDate && t.completed).map(t => ({...t, source: 'To-Do'}))
    ];
    const selectedMood = data.moodHistory[chartSelectedDate];

    const workChartDays = Array.from({length: 5}, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (4 - i));
      const dStr = d.toISOString().split('T')[0];
      const hrs = data.workHistory[dStr] || 0;
      return { date: d.toLocaleDateString('th-TH', {weekday: 'short'}), hours: hrs };
    });

    return (
      <div className="space-y-6">
        <div className="bg-white p-5 rounded-3xl shadow-sm border border-orange-50">
          <h2 className="font-bold text-center text-[#8b7355] mb-4 text-sm">Weekly Mood (สัปดาห์ปัจจุบัน)</h2>
          <div className="flex justify-between items-end h-16 px-2">
            {weekDays.map((d, i) => <div key={i} className="flex flex-col items-center"><div className={`text-2xl mb-1 transition-transform ${d.id !== 'none' ? 'scale-110' : 'opacity-30'}`}>{d.emoji}</div><span className="text-[10px] text-gray-400 font-medium">{d.day}</span></div>)}
          </div>
        </div>

        <div className="bg-[#ffe4e1] p-5 rounded-3xl shadow-sm border border-[#f5d0cd]">
          <h2 className="font-bold text-center text-[#8a5a54] mb-6 text-sm flex items-center justify-center"><Icon name="monitoring" className="text-[16px] mr-2" /> กราฟเวลาทำงาน (5 วันล่าสุด)</h2>
          <div className="flex justify-between items-end h-32 px-2 mt-4">
            {workChartDays.map((w, i) => {
                const heightPct = Math.min((w.hours / 12) * 100, 100);
                const isOverwork = w.hours > 8;
                return (
                  <div key={i} className="flex flex-col items-center w-8"><span className="text-[9px] font-bold text-[#8a5a54] mb-1">{w.hours > 0 ? w.hours + 'h' : '-'}</span><div className="h-24 w-full bg-white/50 rounded-t-md relative flex items-end overflow-hidden"><div className={`w-full rounded-t-md transition-all ${isOverwork ? 'bg-red-500' : 'bg-[#8a5a54]'}`} style={{height: `${heightPct}%`}}></div></div><span className="text-[10px] text-gray-500 mt-2 font-medium">{w.date}</span></div>
                )
            })}
          </div>
          <div className="flex justify-center mt-4 gap-4">
            <div className="flex items-center text-[10px] text-gray-600"><div className="w-2 h-2 bg-[#8a5a54] mr-1 rounded-full"></div> ปกติ (≤ 8 ชม.)</div>
            <div className="flex items-center text-[10px] text-gray-600"><div className="w-2 h-2 bg-red-500 mr-1 rounded-full"></div> ล่วงเวลา (&gt; 8 ชม.)</div>
          </div>
        </div>

        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
          <div className="flex justify-between items-center mb-4">
            <button onClick={() => changeMonth(-1)} className="p-1 text-gray-400 hover:text-gray-700"><Icon name="chevron_left" /></button>
            <h2 className="font-bold text-[#8b7355] text-sm"><Icon name="calendar_month" className="text-[16px] mr-2 align-middle" /> {calDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' })}</h2>
            <button onClick={() => changeMonth(1)} className="p-1 text-gray-400 hover:text-gray-700"><Icon name="chevron_right" /></button>
          </div>
          <div className="grid grid-cols-7 gap-1 text-center mb-2">
            {['อา','จ','อ','พ','พฤ','ศ','ส'].map(d => <div key={d} className="text-[10px] font-bold text-gray-400 py-1">{d}</div>)}
            {days.map((d, i) => {
              if (!d) return <div key={`empty-${i}`} className="p-2"></div>;
              const cellDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const isSelected = chartSelectedDate === cellDateStr;
              const hasMood = !!data.moodHistory[cellDateStr];
              const isToday = todayStr === cellDateStr;
              return (
                <button key={i} onClick={() => setChartSelectedDate(cellDateStr)} className={`relative p-2 text-xs rounded-full aspect-square flex items-center justify-center transition-all ${isSelected ? 'bg-[#8b7355] text-white font-bold shadow-md' : 'hover:bg-orange-50 text-gray-600'} ${isToday && !isSelected ? 'border border-[#8b7355] text-[#8b7355] font-bold' : ''}`}>{d}{hasMood && !isSelected && <div className="absolute top-1 right-1 w-1.5 h-1.5 bg-orange-400 rounded-full"></div>}</button>
              )
            })}
          </div>
          <div className="mt-6 pt-5 border-t border-gray-100">
            <h3 className="text-xs font-bold text-gray-500 mb-3 flex items-center justify-between"><span>บันทึกวันที่ {new Date(chartSelectedDate).toLocaleDateString('th-TH')}</span><span className="text-xl">{MOODS.find(m => m.id === selectedMood)?.emoji || '⚪'}</span></h3>
            <div className="bg-[#faf8f5] p-3 rounded-xl border border-[#f0eadd] space-y-2">
              <p className="text-[10px] font-bold text-[#8b7355] mb-2">รายการที่ทำสำเร็จแล้ว:</p>
              {completedOnSelected.length === 0 ? (
                <p className="text-xs text-gray-400 italic">ไม่มีข้อมูลการทำรายการในวันนี้</p>
              ) : (
                completedOnSelected.map((task, idx) => (
                  <div key={idx} className="flex items-start text-xs text-gray-600">
                    <Icon name="check_circle" className="text-green-500 text-[14px] mr-2 shrink-0 mt-0.5" />
                    <span className={`${task.source === 'Schedule' ? 'font-medium text-[#5c4a44]' : ''}`}>
                      {task.start ? `[${task.start}] ` : ''}{task.text}
                    </span>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      </div>
    );
  };
</script>
