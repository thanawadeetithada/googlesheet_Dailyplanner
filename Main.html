<script type="text/babel">
  window.MainTab = (props) => {
    const { 
      data, setData, todayStr, daysLeft, monthlyTarget, 
      currentBalance, toggleTodo, setConfirmTask
    } = props;
    
    const { useState } = React;
    const Icon = window.Icon;

    const dailyLog = data.dailyLog || { water: 0, workIn: '', workOut: '', breaks: [], completedIds: [] };
    const completedIds = dailyLog.completedIds || [];
    
    // กรองงาน (ซ่อนสิ่งที่อยู่ใน DailyLogs Completed)
    const allTasks = [
      ...data.routines
        .filter(r => !completedIds.includes(r.id))
        .map(r => ({ ...r, type: 'routines' })), 
      ...data.todos
        .filter(t => t.date === todayStr && !t.completed && !completedIds.includes(t.id))
        .map(t => ({ ...t, type: 'todos' }))
    ].sort((a, b) => (a.start || '24:00').localeCompare(b.start || '24:00'));

    const dailyTarget = daysLeft > 0 ? Math.max(0, (monthlyTarget - currentBalance) / daysLeft) : 0;
    const breaks = dailyLog.breaks || [];
    const isBreaking = breaks.length > 0 && !breaks[breaks.length - 1].end;

    const [showWorkConfirm, setShowWorkConfirm] = useState(false);
    const [isWorkTimeLocked, setIsWorkTimeLocked] = useState(false); 

    const handleWaterClick = (index) => {
      const newWater = index < dailyLog.water ? index : index + 1;
      const updatedLog = { ...dailyLog, water: newWater };
      setData(p => ({ ...p, dailyLog: updatedLog }));
      google.script.run.saveDailyLogToSheet(updatedLog); 
    };

    const handleWorkTimeChange = (field, val) => {
      const updatedLog = { ...dailyLog, [field]: val };
      setData(p => ({ ...p, dailyLog: updatedLog }));
      google.script.run.saveDailyLogToSheet(updatedLog);
    };

    const handleToggleBreakAction = () => {
      const timeStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      const newBreaks = [...breaks];
      if (isBreaking) newBreaks[newBreaks.length - 1].end = timeStr;
      else newBreaks.push({ start: timeStr, end: null });

      const updatedLog = { ...dailyLog, breaks: newBreaks };
      setData(p => ({ ...p, dailyLog: updatedLog }));
      google.script.run.saveDailyLogToSheet(updatedLog);
    };

    const confirmWorkTimeSave = () => {
      if (!dailyLog.workIn || !dailyLog.workOut) {
        alert("กรุณากรอกเวลาเข้าและออกให้ครบถ้วนก่อนบันทึก");
        return;
      }
      if (isBreaking) {
        alert("กรุณากด 'จบพัก' ให้เรียบร้อยก่อนบันทึก");
        return;
      }
      setIsWorkTimeLocked(true); 
      setShowWorkConfirm(false);
      google.script.run.saveDailyLogToSheet(dailyLog); 
    };

    return (
      <div className="space-y-4 relative">
        
        {/* 1. TO-DO & SCHEDULE */}
        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
          <h2 className="flex items-center font-bold text-[#8b7355] mb-3 text-sm"><Icon name="task_alt" className="text-[16px] mr-2" /> TO-DO & SCHEDULE (วันนี้)</h2>
          {allTasks.length === 0 ? (
            <div className="py-6 text-center"><p className="text-sm text-gray-400 font-medium">เย้! ไม่มีงานค้างแล้วของวันนี้</p></div>
          ) : (
            <div className="space-y-2">
              {allTasks.map(item => (
                <div key={item.id} className="flex items-start p-2.5 rounded-xl border bg-[#faf8f5] border-[#f0eadd]">
                  <div className="w-14 shrink-0 flex flex-col items-center justify-center border-r border-[#e8dfd1] pr-2 mr-3 min-h-[24px]">
                    {item.start ? (<><span className="text-[11px] font-bold text-[#8b7355]">{item.start}</span><span className="text-[9px] text-gray-400 leading-none mt-1">{item.end}</span></>) : (<span className="text-[10px] font-bold text-gray-500">ตลอดวัน</span>)}
                  </div>
                  <button onClick={() => setConfirmTask({ isOpen: true, id: item.id, type: item.type })} className="mr-2 pt-0.5"><Icon name="radio_button_unchecked" className="text-gray-300 hover:text-[#8b7355] text-[18px]" /></button>
                  <div className="flex-1 pt-0.5"><p className="text-sm text-[#5c4a44] font-medium">{item.text}</p></div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* 2. WORK TIME และ WATER */}
        <div className="grid grid-cols-2 gap-4">
          <div className={`bg-[#ffe4e1] p-4 rounded-2xl shadow-sm flex flex-col relative transition-opacity ${isWorkTimeLocked ? 'opacity-60 pointer-events-none' : ''}`}>
            {isWorkTimeLocked && <div className="absolute inset-0 bg-white/20 z-10 rounded-2xl flex items-center justify-center backdrop-blur-[1px]"><span className="bg-[#8a5a54] text-white px-2 py-1 text-[10px] font-bold rounded shadow-md">บันทึกแล้ว</span></div>}
            
            <h2 className="flex items-center justify-between font-bold text-[#8a5a54] mb-3 text-xs">
              <span className="flex items-center"><Icon name="work" className="text-[14px] mr-1" /> WORK TIME</span>
              <button onClick={() => setShowWorkConfirm(true)} className="bg-[#8a5a54] text-white text-[9px] px-2 py-1 rounded shadow cursor-pointer relative z-20">บันทึก</button>
            </h2>
            <div className="space-y-2 flex flex-col flex-1">
              <div className="flex justify-between bg-white/60 px-2 py-1 rounded-lg"><span className="text-[#8a5a54] text-[11px] font-bold">เข้า</span><input type="time" className="bg-transparent text-right text-[11px] outline-none" value={dailyLog.workIn} onChange={e => handleWorkTimeChange('workIn', e.target.value)} /></div>
              
              <div className="flex-1 flex flex-col justify-center py-1">
                <button onClick={handleToggleBreakAction} className={`w-full py-2.5 rounded-lg text-xs font-bold transition-all shadow-sm flex justify-center items-center ${isBreaking ? 'bg-red-400 text-white' : 'bg-[#e2a8a1] text-[#5c3a36]'}`}>
                  <Icon name="local_cafe" className="text-[14px] mr-1" /> {isBreaking ? 'จบพัก' : 'พักเบรค'}
                </button>
                <div className="mt-2 space-y-1 max-h-[60px] overflow-y-auto pr-1">
                  {breaks.map((b, i) => (
                    <div key={i} className="flex justify-between items-center bg-white/40 px-2 py-1 rounded text-[9px] text-[#8a5a54]">
                      <span>พักที่ {i+1}</span><span className="font-medium">{b.start} - {b.end || '...'}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="flex justify-between bg-white/60 px-2 py-1 rounded-lg"><span className="text-[#8a5a54] text-[11px] font-bold">ออก</span><input type="time" className="bg-transparent text-right text-[11px] outline-none" value={dailyLog.workOut} onChange={e => handleWorkTimeChange('workOut', e.target.value)} /></div>
            </div>
          </div>

          <div className="bg-[#e0f4ff] p-4 rounded-2xl shadow-sm flex flex-col">
            <h2 className="flex items-center font-bold text-[#457b9d] mb-3 text-xs"><Icon name="water_drop" className="text-[14px] mr-1" /> WATER (8)</h2>
            <div className="flex flex-wrap gap-1 justify-center mt-2">
              {[...Array(8)].map((_, i) => <button key={i} onClick={() => handleWaterClick(i)} className="transition-transform active:scale-90"><Icon name="water_drop" className={`text-[22px] ${i < dailyLog.water ? 'text-[#457b9d]' : 'text-[#a8dadc]'}`} /></button>)}
            </div>
            <div className="text-center mt-3"><span className="text-[10px] font-bold text-[#457b9d] bg-white/60 px-2 py-1 rounded-full">ดื่มแล้ว {dailyLog.water}/8 แก้ว</span></div>
          </div>
        </div>

        {/* 3. การเงินเดือนนี้ */}
        <div className="bg-[#e8f3eb] p-4 rounded-2xl shadow-sm border border-[#d1e6d6]">
          <h2 className="flex items-center font-bold text-[#4a6b41] mb-3 text-sm"><Icon name="account_balance_wallet" className="text-[16px] mr-2" /> การเงินเดือนนี้</h2>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div className="bg-white p-3 rounded-xl shadow-sm"><p className="text-[10px] text-gray-500 mb-1">เป้าหมาย (บาท)</p><p className="font-bold text-lg text-[#4a6b41]">{monthlyTarget.toLocaleString()}</p></div>
            <div className="bg-white p-3 rounded-xl shadow-sm"><p className="text-[10px] text-gray-500 mb-1">ทำได้แล้ว (บาท)</p><p className="font-bold text-lg text-[#4a6b41]">{currentBalance.toLocaleString()}</p></div>
          </div>
          <div className="bg-white p-3 rounded-xl flex justify-between items-center shadow-sm">
            <div><p className="text-xs text-gray-600">เหลือเวลาอีก <span className="font-bold text-[#4a6b41]">{daysLeft}</span> วัน</p><p className="text-[10px] text-gray-500">ต้องหาให้ได้วันละ</p></div>
            <div className="text-xl font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-lg border border-orange-100">฿{dailyTarget.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
          </div>
        </div>

        {/* 4. GOALS OF THE YEAR */}
        <div className="bg-gradient-to-br from-[#f2e8d9] to-[#e8decb] p-4 rounded-2xl shadow-sm border border-[#e2d5c0]">
          <h2 className="flex items-center font-bold text-[#6a5542] mb-3 text-sm"><Icon name="track_changes" className="text-[16px] mr-2" /> GOALS OF THE YEAR</h2>
          <div className="space-y-2">
            {data.goals.filter(item => !item.completed).slice(0, 5).map(item => (
              <div key={item.id} className="flex items-center bg-white/60 p-2.5 rounded-xl border border-white/50">
                <button onClick={() => setConfirmTask({ isOpen: true, id: item.id, type: 'goals' })} className="mr-3 shrink-0">
                  <Icon name="radio_button_unchecked" className="text-[#6a5542]/40 text-[20px]" />
                </button>
                <span className="text-sm text-[#6a5542] font-medium">{item.text}</span>
              </div>
            ))}
            {data.goals.filter(item => !item.completed).length === 0 && (
              <p className="text-xs text-center text-[#6a5542]/60 py-2">ยินดีด้วย! คุณทำตามเป้าหมายปีนี้ครบแล้ว</p>
            )}
          </div>
        </div>

        {/* MODAL ยืนยันการบันทึกเวลาทำงาน */}
        {showWorkConfirm && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] px-4 backdrop-blur-sm">
            <div className="bg-white p-6 rounded-3xl w-full max-w-sm text-center shadow-xl">
              <h3 className="text-lg font-bold text-[#8a5a54] mb-2">ยืนยันการบันทึกเวลา</h3>
              <p className="text-gray-600 mb-6 text-sm">คุณต้องการบันทึกเวลาทำงานของวันนี้ใช่หรือไม่?<br/>(หากบันทึกแล้ว จะไม่สามารถแก้เวลาได้อีก)</p>
              <div className="flex gap-3 justify-center">
                <button onClick={() => setShowWorkConfirm(false)} className="px-6 py-2.5 bg-gray-100 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-200 transition">ยกเลิก</button>
                <button onClick={confirmWorkTimeSave} className="px-6 py-2.5 bg-[#8a5a54] text-white rounded-xl text-sm font-bold hover:bg-[#6e4641] transition">ยืนยันการบันทึก</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };
</script>
